# Performance JVM + workarounds Windows 11 25H2 AF_UNIX bug
# Ces flags forcent Java a ne PAS utiliser AF_UNIX pour les Selectors
# (bug "Unable to establish loopback connection" sur Win 25H2 build 26200)
org.gradle.jvmargs=-Xmx4096m -Dfile.encoding=UTF-8 -Djava.net.preferIPv4Stack=true -Djava.net.useSystemProxies=false -Djdk.nio.allowAfUnixIpc=false -Djdk.tls.client.protocols=TLSv1.2 -Dsun.net.useExclusiveBind=false

# Desactiver Gradle daemon pour eviter les sockets daemon
org.gradle.daemon=false
org.gradle.parallel=false

# Force IPv4 partout
systemProp.java.net.preferIPv4Stack=true
systemProp.java.net.useSystemProxies=false
systemProp.http.keepAlive=false
systemProp.jdk.nio.allowAfUnixIpc=false
systemProp.sun.net.useExclusiveBind=false

# Android
android.useAndroidX=true
android.nonTransitiveRClass=true

# Kotlin
kotlin.code.style=official

# Build parallele + cache
org.gradle.parallel=true
org.gradle.caching=true
