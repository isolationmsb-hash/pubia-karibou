name: Build APK debug

on:
  push:
    branches: [main]
  workflow_dispatch:  # permet de declencher manuellement depuis l'UI GitHub

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Generate local.properties
        env:
          APP_API_SECRET: ${{ secrets.API_SHARED_SECRET }}
          APP_BACKEND_URL: ${{ secrets.BACKEND_BASE_URL }}
        run: |
          cat > local.properties <<EOF
          API_SHARED_SECRET=${APP_API_SECRET}
          BACKEND_BASE_URL=${APP_BACKEND_URL}
          sdk.dir=$ANDROID_HOME
          EOF
          echo "local.properties generated (secrets masques par GitHub):"
          cat local.properties | sed 's/SECRET=.*/SECRET=***/'

      - name: Make gradlew executable
        run: |
          # Si gradlew est present, le rendre executable. Sinon utiliser gradle direct.
          if [ -f gradlew ]; then chmod +x gradlew; fi

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build debug APK
        run: |
          # Generer le wrapper si absent puis builder
          gradle wrapper --gradle-version 8.9 --no-daemon || true
          if [ -f gradlew ]; then
            ./gradlew assembleDebug --no-daemon --stacktrace
          else
            gradle assembleDebug --no-daemon --stacktrace
          fi

      - name: List build outputs
        if: always()
        run: |
          echo "=== APKs generes ==="
          find app/build/outputs -name "*.apk" 2>/dev/null || echo "Pas d'APK trouve"

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: pubia-karibou-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 14
          if-no-files-found: warn

      - name: Upload build reports (if failed)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-reports
          path: |
            app/build/reports
            app/build/outputs/logs
          retention-days: 7
          if-no-files-found: warn
